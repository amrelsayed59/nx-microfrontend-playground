@if (service.notifications().length > 0) {
  <div class="stack" aria-live="polite" aria-atomic="false">
    @for (notification of service.notifications(); track notification.id) {
      <div class="toast" role="status">
        <span class="icon" aria-hidden="true">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 6 9 17l-5-5" />
          </svg>
        </span>
        <p class="message">{{ notification.message }}</p>
        <button
          type="button"
          class="close"
          (click)="service.dismiss(notification.id)"
          aria-label="Dismiss notification"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg>
        </button>
      </div>
    }
  </div>
}
